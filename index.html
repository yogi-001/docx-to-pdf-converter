<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>DOCX to PDF – PWA</title>

<!-- PWA -->
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#0d6efd">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
    background: #f8f9fa;
    font-family: 'Segoe UI', sans-serif;
}

.main-container {
    max-width: 720px;
    margin: 40px auto;
    padding: 40px;
    background: white;
    border-radius: 15px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.1);
}

.btn-stack {
    display: flex;
    flex-direction: column;
    gap: 18px;
}

.btn-lg {
    padding: 18px;
    font-size: 1.25rem;
    font-weight: 600;
    border-radius: 12px;
}

.step-number {
    background: #0d6efd;
    color: white;
    width: 38px;
    height: 38px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    border-radius: 50%;
    margin-right: 12px;
}

.file-info {
    background: #e9ecef;
    padding: 15px;
    border-radius: 10px;
    margin: 20px 0;
}

#livePreview {
    border: 2px solid #0d6efd;
    background: white;
    padding: 20px;
    margin-top: 20px;
    max-height: 500px;
    overflow: auto;
}

.a4 {
    width: 210mm;
    min-height: 297mm;
    margin: auto;
    padding: 25mm 20mm;
    background: white;
}

.a4 img {
    max-width: 100%;
    height: auto;
    display: block;
    margin: 15px auto;
}
</style>
</head>

<body>

<div class="main-container">

<h2 class="text-center text-primary mb-4">📄 DOCX → PDF (PWA)</h2>

<div class="btn-stack">

<button id="selectBtn" class="btn btn-primary btn-lg">1️⃣ Select DOCX</button>
<input type="file" id="fileInput" accept=".docx" hidden>

<button id="previewBtn" class="btn btn-warning btn-lg" disabled>2️⃣ Preview</button>
<button id="convertBtn" class="btn btn-success btn-lg" disabled>3️⃣ Download PDF</button>

</div>

<div id="fileInfo" class="file-info text-center d-none">
Selected: <span id="fileName"></span>
</div>

<div id="status" class="alert mt-3 d-none"></div>

<div id="previewSection" class="d-none">
<h5 class="text-center mt-4">Preview</h5>
<div id="livePreview"></div>
</div>

</div>

<!-- Libraries -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.11.0/mammoth.browser.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.2/html2pdf.bundle.min.js"></script>

<script>
let selectedFile = null;
let cleanHTML = "";

const selectBtn = document.getElementById('selectBtn');
const fileInput = document.getElementById('fileInput');
const previewBtn = document.getElementById('previewBtn');
const convertBtn = document.getElementById('convertBtn');

const fileInfo = document.getElementById('fileInfo');
const fileNameEl = document.getElementById('fileName');
const statusEl = document.getElementById('status');

const previewSection = document.getElementById('previewSection');
const livePreview = document.getElementById('livePreview');

selectBtn.onclick = () => fileInput.click();

fileInput.onchange = (e) => {
    selectedFile = e.target.files[0];

    if (selectedFile && selectedFile.name.endsWith(".docx")) {
        fileNameEl.textContent = selectedFile.name;
        fileInfo.classList.remove("d-none");
        previewBtn.disabled = false;
        showStatus("✅ File selected", "success");
    } else {
        showStatus("❌ Only DOCX allowed", "danger");
    }
};

// PREVIEW
previewBtn.onclick = async () => {
    const buffer = await selectedFile.arrayBuffer();

    const result = await mammoth.convertToHtml({ arrayBuffer: buffer });

    cleanHTML = result.value;

    livePreview.innerHTML = `<div class="a4">${cleanHTML}</div>`;
    previewSection.classList.remove("d-none");

    convertBtn.disabled = false;
    showStatus("✅ Preview Ready", "success");
};

// PDF
convertBtn.onclick = async () => {

    const container = document.createElement("div");
    container.innerHTML = cleanHTML;

    container.style.cssText = `
        width:210mm;
        min-height:297mm;
        padding:25mm 20mm;
        background:white;
    `;

    const opt = {
        margin: 0,
        filename: selectedFile.name.replace(".docx", ".pdf"),
        html2canvas: { scale: 3 },
        jsPDF: { unit: 'mm', format: 'a4' }
    };

    await html2pdf().set(opt).from(container).save();

    showStatus("✅ PDF Downloaded", "success");
};

function showStatus(msg, type) {
    statusEl.innerHTML = msg;
    statusEl.className = `alert alert-${type}`;
    statusEl.classList.remove("d-none");
}

</script>

<!-- 🔥 SERVICE WORKER -->
<script>
if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('service-worker.js')
        .then(() => console.log("PWA Ready ✅"))
        .catch(err => console.log("Error", err));
}
</script>

</body>
</html>
