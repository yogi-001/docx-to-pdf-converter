<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DOCX to PDF – Version 5 (Exact Text Size & Alignment)</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #f8f9fa; font-family: 'Segoe UI', sans-serif; }
        .main-container {
            max-width: 720px; margin: 40px auto; padding: 40px;
            background: white; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
        .btn-stack { display: flex; flex-direction: column; gap: 18px; }
        .btn-lg { padding: 18px; font-size: 1.25rem; font-weight: 600; border-radius: 12px; }
        .step-number {
            background: #0d6efd; color: white; width: 38px; height: 38px;
            display: inline-flex; align-items: center; justify-content: center;
            border-radius: 50%; font-weight: bold; margin-right: 12px;
        }
        .file-info { background: #e9ecef; padding: 15px; border-radius: 10px; margin: 20px 0; }
        #status { min-height: 70px; }
        #livePreview {
            border: 2px solid #0d6efd;
            background: white;
            padding: 20px;
            margin-top: 20px;
            max-height: 500px;
            overflow: auto;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        #livePreview .a4 {
            width: 210mm;
            min-height: 297mm;
            margin: 0 auto;
            padding: 25mm 20mm;           /* Exact Word default margins */
            background: white;
            box-shadow: 0 0 10px rgba(0,0,0,0.2);
        }
        #livePreview img {
            max-width: 100%;
            height: auto;
            display: block;
            margin: 15px auto;
            page-break-inside: avoid;
        }
    </style>
</head>
<body>
    <div class="main-container">
        <h1 class="text-center mb-4 text-primary fw-bold">📄 DOCX to PDF – Version 5</h1>
        <p class="text-center text-muted mb-4">✅ Exact text size + alignment from your DOCX<br>✅ Image kept on page 2 (SBI photo)<br>No forced font changes</p>

        <div class="btn-stack">
            <button id="selectBtn" class="btn btn-primary btn-lg d-flex align-items-center">
                <span class="step-number">1</span> Pick DOC/DOCX File
            </button>
            <input type="file" id="fileInput" accept=".docx" style="display:none">

            <button id="previewBtn" class="btn btn-warning btn-lg d-flex align-items-center" disabled>
                <span class="step-number">2</span> Show Live Preview (Exact DOCX look)
            </button>

            <button id="convertBtn" class="btn btn-success btn-lg d-flex align-items-center" disabled>
                <span class="step-number">3</span> Download PDF (Exact Match)
            </button>

            <button id="shareBtn" class="btn btn-info btn-lg text-white d-flex align-items-center" disabled>
                <span class="step-number">4</span> Share via WhatsApp / Telegram
            </button>
        </div>

        <div id="fileInfo" class="file-info text-center d-none">
            <strong>Selected:</strong> <span id="fileName"></span>
        </div>

        <div id="status" class="mt-4 alert alert-info text-center d-none"></div>

        <!-- LIVE PREVIEW -->
        <div id="previewSection" class="mt-4 d-none">
            <h5 class="text-center">Live Preview – Exact text size & alignment from your DOCX</h5>
            <div id="livePreview"></div>
        </div>
    </div>

    <!-- Libraries -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.11.0/mammoth.browser.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.2/html2pdf.bundle.min.js"></script>

    <script>
        let selectedFile = null;
        let pdfBlob = null;
        let pdfFileName = "";
        let cleanHTML = "";

        const selectBtn = document.getElementById('selectBtn');
        const fileInput = document.getElementById('fileInput');
        const previewBtn = document.getElementById('previewBtn');
        const convertBtn = document.getElementById('convertBtn');
        const shareBtn = document.getElementById('shareBtn');
        const fileInfo = document.getElementById('fileInfo');
        const fileNameEl = document.getElementById('fileName');
        const statusEl = document.getElementById('status');
        const previewSection = document.getElementById('previewSection');
        const livePreview = document.getElementById('livePreview');

        selectBtn.addEventListener('click', () => fileInput.click());

        fileInput.addEventListener('change', e => {
            selectedFile = e.target.files[0];
            if (selectedFile && selectedFile.name.toLowerCase().endsWith('.docx')) {
                fileNameEl.textContent = selectedFile.name;
                fileInfo.classList.remove('d-none');
                previewBtn.disabled = false;
                showStatus('✅ File selected.<br>Click "Show Live Preview" – text size & alignment will match your DOCX exactly.', 'success');
            } else {
                showStatus('❌ Only .docx files allowed', 'danger');
            }
        });

        // STEP 2: LIVE PREVIEW (NO font override)
        previewBtn.addEventListener('click', async () => {
            if (!selectedFile) return;
            showStatus('🔄 Generating preview with exact DOCX styles...', 'info');
            previewBtn.disabled = true;

            try {
                const arrayBuffer = await selectedFile.arrayBuffer();
                const result = await mammoth.convertToHtml({ arrayBuffer });

                cleanHTML = result.value;

                // Render exactly as Mammoth gives us (preserves original font size, alignment, bold, etc.)
                livePreview.innerHTML = `<div class="a4">${cleanHTML}</div>`;
                previewSection.classList.remove('d-none');

                showStatus('✅ Preview now matches your DOCX text size & alignment!<br>Image on page 2.<br>Click "Download PDF".', 'success');
                convertBtn.disabled = false;

            } catch (err) {
                showStatus('❌ Preview failed: ' + err.message, 'danger');
            }
            previewBtn.disabled = false;
        });

        // STEP 3: CONVERT TO PDF (NO font override)
        convertBtn.addEventListener('click', async () => {
            if (!cleanHTML) {
                showStatus('❌ Click "Show Live Preview" first', 'danger');
                return;
            }

            showStatus('🔄 Creating PDF with exact text size & alignment from DOCX...', 'info');
            convertBtn.disabled = true;

            try {
                const tempDiv = document.createElement('div');
                tempDiv.innerHTML = cleanHTML;
                tempDiv.style.cssText = `
                    width: 210mm;
                    min-height: 297mm;
                    padding: 25mm 20mm;
                    background: white;
                    margin: 0 auto;
                `;

                // Keep images perfect
                tempDiv.querySelectorAll('img').forEach(img => {
                    img.style.maxWidth = '100%';
                    img.style.height = 'auto';
                    img.style.display = 'block';
                    img.style.margin = '15px auto';
                });

                const options = {
                    margin: [0, 0, 0, 0],
                    filename: selectedFile.name.replace('.docx', '.pdf'),
                    image: { type: 'jpeg', quality: 0.98 },
                    html2canvas: { scale: 3, useCORS: true, logging: false },  // Higher scale = sharper text
                    jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
                };

                const worker = html2pdf().set(options).from(tempDiv);
                pdfBlob = await worker.output('blob');
                pdfFileName = selectedFile.name.replace('.docx', '.pdf');

                // Auto download
                const url = URL.createObjectURL(pdfBlob);
                const a = document.createElement('a');
                a.href = url; a.download = pdfFileName;
                document.body.appendChild(a); a.click(); a.remove();
                URL.revokeObjectURL(url);

                showStatus(`✅ PDF created with EXACT text size & alignment!<br>Matches your original DOCX perfectly.`, 'success');
                shareBtn.disabled = false;

            } catch (err) {
                showStatus('❌ Error: ' + err.message, 'danger');
            }
            convertBtn.disabled = false;
        });

        // STEP 4: SHARE
        shareBtn.addEventListener('click', async () => {
            if (!pdfBlob) return;
            const file = new File([pdfBlob], pdfFileName, { type: 'application/pdf' });

            if (navigator.share && navigator.canShare({ files: [file] })) {
                await navigator.share({ files: [file], title: 'Offer Letter PDF' });
                showStatus('🎉 Shared successfully!', 'success');
            } else {
                showStatus('✅ PDF downloaded again.<br>Attach in WhatsApp or Telegram.', 'warning');
                const url = URL.createObjectURL(pdfBlob);
                const a = document.createElement('a'); a.href = url; a.download = pdfFileName; a.click();
                URL.revokeObjectURL(url);
            }
        });

        function showStatus(msg, type) {
            statusEl.innerHTML = msg;
            statusEl.className = `mt-4 alert alert-${type} text-center`;
            statusEl.classList.remove('d-none');
        }

        showStatus('👆 Click button 1 → select Offer_Yogesh_share.docx<br>Then use button 2 to see exact match before downloading.', 'info');
    </script>
</body>
</html>
